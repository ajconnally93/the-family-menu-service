<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Family Menu - Meal Library</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <a href="/" class="brand text-decoration-none">
        <div class="brand-mark">🍽</div>
        <div>The Family Menu</div>
      </a>
      <div class="nav-links">
        <span class="active">Meal Library</span>
        <span>My Meal Plan</span>
        <span>My Grocery List</span>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="mb-4">
      <div class="eyebrow">Meal planning made simpler</div>
      <h1 class="mb-2">Meal Library</h1>
      <p class="page-intro">
        Browse reusable meals, filter by tags, and start building your weekly meal plan.
      </p>
    </div>

    <div class="filter-bar mb-4">
      <button class="chip active" data-tag="">All Meals</button>
      <button class="chip" data-tag="kid-friendly">Kid-Friendly</button>
      <button class="chip" data-tag="quick">Quick</button>
      <button class="chip" data-tag="updated">Updated</button>
      <button class="chip" data-tag="test">Test</button>
    </div>

    <div id="mealContainer" class="row g-4">
      <!-- Meal cards will render here -->
    </div>
  </div>

  <script src="js/mealLibrary.js"></script>
</body>
</html>
