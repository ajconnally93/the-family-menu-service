<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Family Menu - My Meal Plan</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <a href="/" class="brand text-decoration-none">
        <div class="brand-mark">🍽</div>
        <div>The Family Menu</div>
      </a>
      <div class="nav-links">
        <a href="/meal-library.html" class="nav-link-custom">Meal Library</a>
        <span class="active">My Meal Plan</span>
        
        <!-- TODO: Convert to link when My Grocery List page is implemented -->
        <span>My Grocery List</span>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="mb-4">
      <div class="eyebrow">Your saved weekly selections</div>
      <h1 class="mb-2">My Meal Plan</h1>
      <p class="page-intro">
        View your selected meals, remove meals you no longer want, and review estimated cost before generating your grocery list.
      </p>
    </div>

    <div class="plan-summary mb-4">
      <div class="summary-card">
        <p class="summary-label">Estimated Total Cost</p>
        <h2 id="planTotalCost">$0.00</h2>
      </div>
    </div>

    <div id="mealPlanContainer" class="row g-4">
      <!-- Meal plan items will render here -->
    </div>
  </div>

  <script src="js/myMealPlan.js"></script>
</body>
</html>
