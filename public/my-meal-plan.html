<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Family Menu - My Meal Plan</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <a href="/" class="brand text-decoration-none">
        <div class="brand-mark">🍽</div>
        <div>The Family Menu</div>
      </a>

      <div class="nav-links">
        <a href="/meal-library.html" class="nav-link-custom">Meal Library</a>
        <a href="/my-meal-plan.html" class="nav-link-custom active">My Meal Plan</a>

        <a
          href="/grocery-list.html"
          class="nav-link-custom"
          id="grocery-list-link"
          data-bs-toggle="tooltip"
          data-bs-placement="bottom"
        >
          My Grocery List
        </a>

        <div id="auth-section"></div>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="mb-4">
      <div class="eyebrow">Your saved selections</div>
      <h1 class="mb-2">My Meal Plan</h1>
      <p class="page-intro">
        View your selected meals, remove meals you no longer want, and review estimated costs.
      </p>
    </div>

    <div class="plan-summary mb-4">
      <div class="summary-card">
        <p class="summary-label">Estimated Total Cost</p>
        <h2 id="planTotalCost">$0.00</h2>
      </div>
    </div>

    <div id="mealPlanContainer" class="row g-4"></div>

    <div class="modal fade" id="recipeModal" tabindex="-1" aria-labelledby="recipeModalTitle" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content recipe-modal">
          <div class="modal-header recipe-modal-header">
            <div>
              <p class="recipe-modal-eyebrow mb-1">Recipe Card</p>
              <h2 class="modal-title" id="recipeModalTitle">Meal Title</h2>
            </div>
            <button type="button" class="btn-close recipe-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body recipe-modal-body">
            <div class="recipe-summary-card">
              <p id="recipeModalDescription" class="recipe-description mb-3"></p>

              <div class="recipe-cost-pill">
                <span>Estimated cost</span>
                <strong id="recipeModalCost">$0.00</strong>
              </div>
            </div>

            <div class="row g-4 mt-1">
              <div class="col-md-5">
                <section class="recipe-section">
                  <h3>Ingredients</h3>
                  <ul id="recipeModalIngredients" class="recipe-ingredient-list"></ul>
                </section>
              </div>

              <div class="col-md-7">
                <section class="recipe-section">
                  <h3>Instructions</h3>
                  <ol id="recipeModalInstructions" class="recipe-step-list"></ol>
                </section>
              </div>
            </div>
          </div>

          <div class="modal-footer recipe-modal-footer">
            <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/authNav.js"></script>
  <script src="js/myMealPlan.js"></script>
</body>
</html>
